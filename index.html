<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SOC Alert Tracker</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">SOC</div>
          <div>
            <strong>SOC Tracker</strong>
            <span>Open alert operations</span>
          </div>
        </div>
        <nav class="nav" aria-label="Primary">
          <button class="nav-item active" data-view="dashboard">Dashboard</button>
          <button class="nav-item" data-view="queue">Alert queue</button>
          <button class="nav-item" data-view="cases">Cases</button>
          <button class="nav-item" data-view="automation">n8n automation</button>
          <button class="nav-item" data-view="reports">Reports</button>
          <button class="nav-item" data-view="settings">Settings</button>
        </nav>
        <div class="sidebar-footer">
          <label class="theme-control">
            Theme
            <select id="themeSelect" aria-label="Theme">
              <option value="system">System</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </label>
          <span>MIT licensed</span>
          <button id="resetDemo" type="button">Reset demo</button>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Security operations</p>
            <h1 id="viewTitle">SOC Dashboard</h1>
          </div>
          <div class="topbar-actions">
            <label class="search">
              <span>Search</span>
              <input id="searchInput" type="search" placeholder="Alert, IOC, asset, analyst">
            </label>
            <button id="newAlertButton" class="primary" type="button">New alert</button>
          </div>
        </header>

        <section class="filters" aria-label="Alert filters">
          <select id="severityFilter" aria-label="Filter by severity">
            <option value="all">All severities</option>
            <option value="Critical">Critical</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
          <select id="statusFilter" aria-label="Filter by status">
            <option value="all">All statuses</option>
            <option value="New">New</option>
            <option value="Triage">Triage</option>
            <option value="Investigating">Investigating</option>
            <option value="Contained">Contained</option>
            <option value="Closed">Closed</option>
          </select>
          <select id="analystFilter" aria-label="Filter by analyst">
            <option value="all">All analysts</option>
          </select>
        </section>

        <section id="content" class="content" aria-live="polite"></section>
      </main>
    </div>

    <dialog id="alertDialog">
      <form id="alertForm" method="dialog" class="issue-form">
        <header>
          <h2 id="dialogTitle">New alert</h2>
          <button class="icon-button" data-close-dialog type="button" aria-label="Close">x</button>
        </header>
        <input id="alertId" type="hidden">
        <label>
          Alert title
          <input id="title" required maxlength="140">
        </label>
        <label>
          Description
          <textarea id="description" rows="4"></textarea>
        </label>
        <div class="form-grid">
          <label>
            Source
            <input id="source" maxlength="60" placeholder="SIEM, EDR, IDS">
          </label>
          <label>
            Severity
            <select id="severity">
              <option>Critical</option>
              <option>High</option>
              <option>Medium</option>
              <option>Low</option>
            </select>
          </label>
          <label>
            Status
            <select id="status">
              <option>New</option>
              <option>Triage</option>
              <option>Investigating</option>
              <option>Contained</option>
              <option>Closed</option>
            </select>
          </label>
          <label>
            Analyst
            <input id="analyst" maxlength="40">
          </label>
          <label>
            MITRE tactic
            <input id="tactic" maxlength="60">
          </label>
          <label>
            Asset
            <input id="asset" maxlength="80">
          </label>
        </div>
        <label>
          IOCs
          <input id="iocs" placeholder="IP, hash, domain, username">
        </label>
        <label>
          SLA hours
          <input id="slaHours" type="number" min="1" max="168" value="8">
        </label>
        <footer>
          <button id="deleteAlertButton" class="danger" type="button">Delete</button>
          <span></span>
          <button data-close-dialog type="button">Cancel</button>
          <button id="saveAlertButton" class="primary" value="default" type="submit">Save alert</button>
        </footer>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
